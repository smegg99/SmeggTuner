# This file contains the configuration for this project.
# When you update `info` or `fileAssociations`, run `wails3 task common:update:build-assets` to update the assets.
# Note that this will overwrite any changes you have made to the assets.
version: '3'

# This information is used to generate the build assets.
info:
  companyName: "Smegg99" # The name of the company
  productName: "SmeggTuner" # The name of the application
  productIdentifier: "me.smegg.smeggtuner" # The unique product identifier
  description: "A FOSS accordion tuner desktop app." # The application description
  copyright: "(c) 2026, Smegg99" # Copyright text
  # comments: "" # Comments
  version: "1.0.2" # The application version
  # cfBundleIconName: "appicon" # The macOS icon name in Assets.car icon bundles (optional)
  #                               # Should match the name of your .icon file without the extension
  #                               # If not set and Assets.car exists, defaults to "appicon"

# iOS build configuration (uncomment to customise iOS project generation)
# Note: Keys under `ios` OVERRIDE values under `info` when set.
# ios:
#   # The iOS bundle identifier used in the generated Xcode project (CFBundleIdentifier)
#   bundleID: "com.mycompany.myproduct"
#   # The display name shown under the app icon (CFBundleDisplayName/CFBundleName)
#   displayName: "My Product"
#   # The app version to embed in Info.plist (CFBundleShortVersionString/CFBundleVersion)
#   version: "0.0.1"
#   # The company/organisation name for templates and project settings
#   company: "My Company"
#   # Additional comments to embed in Info.plist metadata
#   comments: "Some Product Comments"

# Dev mode configuration
dev_mode:
  root_path: .
  log_level: warn
  debounce: 200
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js" # Watch for changes to JS/TS files included using the //wails:include directive.
      - "*.ts" # The frontend directory will be excluded entirely by the setting above.
    git_ignore: true
  executes:
    - cmd: wails3 task common:dev:preflight
      type: blocking
    - cmd: wails3 build ${WAILS_BUILD_TAGS:+-tags $WAILS_BUILD_TAGS} DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task common:dev:wait
      type: blocking
    - cmd: wails3 task run
      type: primary

# No file associations. The app's own files are .stsf and .stif, but a double
# click has nowhere to land yet: opening a file on launch is not wired (main.go
# only logs a second instance's args). Register .stsf/.stif here once it is,
# not before - an association that does nothing is worse than none.
