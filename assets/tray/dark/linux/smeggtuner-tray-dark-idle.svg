<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pixel-grid accordion: every coordinate is even, so the mark lands on exact
       pixel boundaries at 16, 32 and 64 - the tray sizes. Detail beyond this
       does not survive 16px (see git history for the art it replaced). -->
  <g fill="#ffffff">
    <rect x="2" y="6" width="6" height="20" rx="2"/>
    <rect x="22" y="6" width="6" height="20" rx="2"/>
    <rect x="10" y="10" width="2" height="12"/>
    <rect x="14" y="10" width="2" height="12"/>
    <rect x="18" y="10" width="2" height="12"/>
  </g>
</svg>
