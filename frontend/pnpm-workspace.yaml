# pnpm 11 no longer reads `pnpm.onlyBuiltDependencies` from package.json; the same
# three packages are approved here instead. They are the ones that need a
# postinstall to be usable at all - esbuild and unrs-resolver unpack a native
# binary, @parcel/watcher builds one - and without them the dev server and the
# linter do not run.
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  unrs-resolver: true

# Two pnpm entry points (corepack and the system binary) once ping-ponged the modules layout,
# each demanding a from-scratch reinstall of the other's. packageManager pins them to one
# version; this makes any remaining layout migration reinstall without stopping a build to ask.
confirmModulesPurge: false
