version: '3'

includes:
  common: ./build/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  linux: ./build/linux/Taskfile.yml

vars:
  APP_NAME: "smeggtuner"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'
  # GTK 3 (WebKitGTK 4.1) is the default, matching the justfile: the GTK 4 port
  # reallocates the whole compositing surface on a window drag, which on this
  # app - four canvases - is the difference between a smooth resize and a stall.
  # `task ...:build-gtk4` / the justfile's -gtk4 recipes build the other one.
  TAGS: '{{.WAILS_BUILD_TAGS | default "gtk3"}}'

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"
        vars:
          EXTRA_TAGS: '{{.TAGS}}'

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"
        vars:
          EXTRA_TAGS: '{{.TAGS}}'

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    env:
      WAILS_BUILD_TAGS: '{{.TAGS}}'
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}
